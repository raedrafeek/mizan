name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # prisma generate (postinstall) reads only the schema — no DB needed
      - run: npm ci
      - run: npm run check
      - run: npm test
